<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoTracker - Welcome</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: 
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
        url('assets/bg-img.jpg') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      color: #ffffff;
      margin-bottom: 20px;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
    }

    #slideshow {
      position: relative;
      width: 80%;
      max-width: 600px;
      height: 350px;
      overflow: hidden;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      margin-bottom: 20px;
      background: #fff;
    }

    #slideshow img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    #slideshow img.active {
      display: block;
    }

    
    .quote-marquee {
      position: absolute;
      bottom: 10px;
      width: 100%;
      color: #a63e3e;
      font-size: 30px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
      white-space: nowrap;
      animation: scrollText 5s linear infinite;
    }

    @keyframes scrollText {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    .enter-btn {
      background-color: #2e7d32;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    .enter-btn:hover {
      background-color: #1b5e20;
      box-shadow: 0 0 12px rgba(46,125,50,0.8);
    }
  </style>
</head>
<body>
  <h1>Welcome to EcoTracker</h1>

  <div id="slideshow">
    <img src="assets/welcome1.jpg" class="active" alt="Eco Image 1">
    <img src="assets/welcome2.jpg" alt="Eco Image 2">
    <img src="assets/welcome3.jpeg" alt="Eco Image 3">
    <img src="assets/welcome4.jpeg" alt="Eco Image 4">

    
    <div class="quote-marquee" id="quoteText">Be a part of Solution ,Not Part of Pollution.</div>
  </div>

  <button class="enter-btn" onclick="enterSite()">Click Me</button>

  <script>
   
    let currentIndex = 0;
    const images = document.querySelectorAll("#slideshow img");

    function showNextImage() {
      images[currentIndex].classList.remove("active");
      currentIndex = (currentIndex + 1) % images.length;
      images[currentIndex].classList.add("active");
    }

    setInterval(showNextImage, 5000); 

    
    function enterSite() {
      window.location.href = "index.html";
    }

    
    const quotes = [
      "Cleanliness is next to godliness.",
      "A clean environment starts with you.",
      "Keep it green, keep it clean.",
      "Clean habits create a healthy planet."
    ];
    let quoteIndex = 0;
    const quoteText = document.getElementById("quoteText");

    function showNextQuote() {
      quoteIndex = (quoteIndex + 1) % quotes.length;
      quoteText.textContent = quotes[quoteIndex];
    }

    setInterval(showNextQuote, 5000);
  </script>
</body>
</html>
